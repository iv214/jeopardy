services:
  backend:
    image: ghcr.io/iv214/jeopardy-backend:latest
    container_name: jeopardy-backend
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
      - PROD_FRONTEND_URL="http://frontend"
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
  frontend:
    image: ghcr.io/iv214/jeopardy-frontend:latest
    container_name: jeopardy-frontend
    environment:
      - VITE_BACKEND_URL="http://backend:3000"
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
